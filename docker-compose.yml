services:
  backend:
    build:
      context: ./BE
    container_name: capstone-backend
    ports:
      - "8000:8000"
    volumes:
      - ./BE:/app
      - ./BE/db.sqlite3:/app/db.sqlite3
    # restart: unless-stopped

  frontend:
    build:
      context: ./FE/web-ui
    container_name: capstone-frontend
    ports:
      - "3000:3000"
    volumes:
      - ./FE/web-ui:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    # restart: unless-stopped